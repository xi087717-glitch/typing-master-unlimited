<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Master • Grind</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0a0f; 
      color: white; 
      margin:0; 
      padding:0; 
      height:100vh; 
      overflow:hidden; 
      display:flex; 
      flex-direction:column;
    }
    .header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
    }
    .text-char { 
      font-size: 2rem; 
      line-height: 2.8; 
    }
    .correct { color: #22ff88; }
    .incorrect { color: #ff5555; text-decoration: underline wavy; }
    .current { background: #ffeb3b; color: #000; padding: 4px 10px; border-radius: 6px; animation: pulse 500ms infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .textarea {
      width: 100%;
      height: 320px;
      background: #111118;
      border: none;
      outline: none;
      color: white;
      font-size: 1.9rem;
      padding: 30px 40px;
      resize: none;
      font-family: 'Inter', sans-serif;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- Minimal Header -->
  <div class="header">
    <h1 class="text-4xl font-bold">Typing Master</h1>
    <div class="flex gap-12 text-2xl font-medium">
      <div>Level <span id="level" class="text-emerald-400">1</span></div>
      <div>Time: <span id="timer" class="text-yellow-300">120</span>s</div>
      <div>WPM: <span id="wpm" class="text-yellow-300">0</span></div>
      <div>Accuracy: <span id="accuracy" class="text-emerald-400">100%</span></div>
    </div>
  </div>

  <!-- Typing Area -->
  <div class="flex-1 p-12 flex flex-col">
    <div id="text-display" class="text-char flex-1 p-16 bg-[#111118] rounded-3xl overflow-auto leading-relaxed select-none"></div>
    
    <textarea id="input" class="textarea mt-8" spellcheck="false" placeholder="Start typing... keep the flow going"></textarea>
  </div>

  <script>
    let currentLevel = 1;
    let unlockedLevels = [1];
    let timerInterval, startTime, testText = '', totalLength = 0;
    let correctChars = 0, totalChars = 0, errors = 0;
    let isTestRunning = false;

    function getTextForLevel(level) {
      let text = "Hey friend, let's keep the flow going. Typing is all about rhythm and consistency. The more you type fast and accurately, the faster your level grows. ";
      for (let i = 1; i <= level + 7; i++) {
        text += `Daily practice builds real skill. Numbers ${100 + level*22}, symbols ; : " ' ? ! and long sentences make you sharper every single day. Never stop. You are improving right now. `;
      }
      return text;
    }

    function startLevel() {
      testText = getTextForLevel(currentLevel);
      totalLength = testText.length;

      document.getElementById('level').textContent = currentLevel;
      document.getElementById('text-display').innerHTML = testText.split('').map(c => 
        `<span class="text-char">${c === ' ' ? '&nbsp;' : c}</span>`
      ).join('');

      document.getElementById('input').value = '';
      document.getElementById('input').focus();

      correctChars = totalChars = errors = 0;
      isTestRunning = true;
      startTime = Date.now();

      document.getElementById('timer').textContent = 120;

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        let t = parseInt(document.getElementById('timer').textContent) - 1;
        document.getElementById('timer').textContent = t;
        if (t <= 0) endTest(true);
      }, 1000);

      const input = document.getElementById('input');
      input.oninput = liveHighlight;
    }

    function liveHighlight() {
      if (!isTestRunning) return;
      const input = document.getElementById('input').value;
      const chars = document.getElementById('text-display').children;

      correctChars = errors = 0;
      for (let i = 0; i < chars.length; i++) {
        const span = chars[i];
        if (i < input.length) {
          if (input[i] === testText[i]) {
            span.className = 'correct text-char';
            correctChars++;
          } else {
            span.className = 'incorrect text-char';
            errors++;
          }
        } else if (i === input.length) {
          span.className = 'current text-char';
        } else {
          span.className = 'text-char';
        }
      }
      totalChars = input.length;

      const timePassed = (Date.now() - startTime) / 60000;
      const wpm = timePassed > 0 ? Math.round((correctChars / 5) / timePassed) : 0;
      const acc = totalChars > 0 ? Math.round(((totalChars - errors) / totalChars) * 100) : 100;

      document.getElementById('wpm').textContent = wpm;
      document.getElementById('accuracy').textContent = acc + '%';
    }

    function endTest(timeout = false) {
      clearInterval(timerInterval);
      isTestRunning = false;

      const timePassed = (Date.now() - startTime) / 60000;
      const wpm = timePassed > 0 ? Math.round((correctChars / 5) / timePassed) : 0;
      const acc = totalChars > 0 ? Math.round(((totalChars - errors) / totalChars) * 100) : 100;

      const required = 12 + (currentLevel * 7);

      if (timeout || wpm < required || acc < 82) {
        setTimeout(() => startLevel(), 800);
      } else {
        currentLevel++;
        confetti({particleCount: 400, spread: 80});
        setTimeout(() => {
          startLevel();
        }, 800);
      }
    }

    window.onload = () => {
      startLevel();
    };
  </script>
</body>
</html>
